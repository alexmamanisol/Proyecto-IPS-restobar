name: CI & Deploy (Turborepo) -> Vercel

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max_old_space_size=4096"

jobs:
  ci:
    name: CI (turbo)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Cache turbo ~/.cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/turbo
            node_modules
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Build changed packages with turbo
        run: npx turbo run build --filter=...
        # Remove --filter or adjust to your needs; turbo will run affected builds by default:
        # npx turbo run build

      - name: Run tests (turbo)
        run: npx turbo run test --concurrency 3

      - name: Lint (turbo)
        run: npx turbo run lint --concurrency 2 || true

      - name: Upload build artifact (frontend app)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
          apps/admin-frontend/dist # o apps/web/out or apps/web/build según tu framework
          apps/admin-frontend/.next
          apps/admin-frontend/out

  vercel-deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: 'pnpm'

      - name: Install root deps
        run: pnpm install --frozen-lockfile

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: apps/web/.next

      - name: Install Vercel CLI
        run: pnpm add -g vercel@34

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Deploy the frontend (change path if you build to a different folder)
          vercel --token "$VERCEL_TOKEN" --prod --confirm ./apps/web \
            --scope "$VERCEL_ORG_ID" --git-branch main || true
